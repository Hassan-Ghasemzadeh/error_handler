<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeAra Studio | Open Source Packages</title>
    <style>
        body {
            background-color: #0b0f19;
            color: #f8fafc;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container { text-align: center; padding: 2rem; }
        h1 { font-size: 2.5rem; margin-bottom: 0.5rem; background: linear-gradient(135deg, #38bdf8, #6366f1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { color: #94a3b8; margin-bottom: 2.5rem; }
        .package-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 1.5rem 2rem;
            border-radius: 16px;
            text-decoration: none;
            color: #f1f5f9;
            display: inline-flex;
            align-items: center;
            gap: 1rem;
            transition: all 0.2s;
        }
        .package-card:hover { transform: translateY(-2px); border-color: #38bdf8; box-shadow: 0 10px 25px rgba(56, 189, 248, 0.15); }
        .arrow { color: #38bdf8; font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <h1>CodeAra Studio</h1>
    <p>Explore our open-source Dart & Flutter packages.</p>

    <a href="/resultex" class="package-card">
        <div>
            <strong style="display:block; text-align:left; font-size: 1.1rem;">Resultex</strong>
            <span style="color:#64748b; font-size:0.9rem;">Functional error handling for Dart</span>
        </div>
        <span class="arrow">&rarr;</span>
    </a>
</div>
</body>
</html>
