<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | CodeAra Studio</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --text-main: #f8fafc;
            --text-muted: #64748b;
            --primary: #38bdf8;
            --secondary: #6366f1;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            position: relative;
        }

        /* Ambient Background Glow */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: var(--primary);
            filter: blur(150px);
            opacity: 0.15;
            z-index: 0;
        }
        body::before { top: -50px; left: -50px; background: var(--secondary); }
        body::after { bottom: -50px; right: -50px; }

        .container {
            text-align: center;
            padding: 2.5rem;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            max-width: 450px;
            width: 90%;
            z-index: 1;
            animation: fadeIn 0.8s ease-out;
        }

        .error-code {
            font-size: 7.5rem;
            font-weight: 900;
            margin: 0;
            line-height: 1;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -2px;
            animation: pulse 3s infinite alternate;
        }

        h1 {
            font-size: 1.8rem;
            margin: 1.5rem 0 0.5rem 0;
            color: #f1f5f9;
            font-weight: 700;
        }

        p {
            color: var(--text-muted);
            font-size: 1rem;
            line-height: 1.7;
            margin: 0 0 2.5rem 0;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0284c7, #4f46e5);
            color: white;
            text-decoration: none;
            padding: 0.9rem 2.2rem;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.3);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(79, 70, 229, 0.5);
            opacity: 0.95;
        }

        .btn:active {
            transform: translateY(-1px);
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0% { filter: drop-shadow(0 0 0px rgba(56, 189, 248, 0)); }
            100% { filter: drop-shadow(0 0 15px rgba(99, 102, 241, 0.3)); }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="error-code">404</div>
    <h1>Lost in Space?</h1>
    <p>The page you are looking for doesn't exist or has been moved. Don't worry, you can safely
        head back to the homepage.</p>
    <a href="https://codearastudio.ir/" class="btn">Back to Home</a>
</div>

</body>
</html>
