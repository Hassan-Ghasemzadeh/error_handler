<!DOCTYPE html>
<html lang="en">

    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: rgba(22, 27, 34, 0.7);
            --border-color: rgba(48, 54, 61, 0.8);
            --text-main: #c9d1d9;
            --text-white: #f0f6fc;
            --text-muted: #8b949e;
            --primary: #58a6ff;
            --secondary: #bc8cff;
            --success: #56d364;
            --code-bg: #161b22;
        }

        body {
            background-color: var(--bg-color);

            margin: 0;
            padding: 0;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Ambient Background Lights */
        .glow {
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            filter: blur(160px);
            opacity: 0.15;
            z-index: -1;
        }
        .glow-1 { top: -150px; right: -50px; background: var(--primary); }
        .glow-2 { top: 500px; left: -150px; background: var(--secondary); }

        }

        .badge {

            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 2rem;
            border: 1px solid rgba(88, 166, 255, 0.2);
        }

        .badge-dot {
            width: 8px;
            height: 8px;
            background-color: var(--success);

            display: inline-block;
        }

        h1 {
            font-size: 4rem;
            font-weight: 800;
            margin: 0 0 1.5rem 0;
            color: var(--text-white);
            letter-spacing: -1.5px;
            background: linear-gradient(135deg, #fff 40%, #8b949e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline {
            font-size: 1.35rem;
            color: var(--text-muted);
            max-width: 700px;
            margin: 0 auto 3rem auto;
            font-weight: 400;
        }

        .cta-buttons {
            display: flex;
            gap: 1.2rem;
            justify-content: center;
            margin-bottom: 5rem;
        }

        .btn {
            text-decoration: none;
            padding: 0.9rem 2.2rem;

            font-weight: 600;
            font-size: 1rem;

            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, #1f6feb, #6f42c1);
            color: var(--text-white);
            box-shadow: 0 4px 20px rgba(111, 66, 193, 0.25);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(111, 66, 193, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-white);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: #8b949e;
            transform: translateY(-2px);
        }

        main {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 2rem 6rem 2rem;
        }

        /* Features Section */
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 6rem;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 2.2rem;
            border-radius: 20px;
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: rgba(88, 166, 255, 0.4);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .card h3 {
            margin: 0 0 0.85rem 0;
            font-size: 1.3rem;
            color: var(--text-white);
            font-weight: 600;
        }

        .card p {
            margin: 0;
            color: var(--text-muted);
            font-size: 0.98rem;
            line-height: 1.6;
        }

        .section-header {
            margin-bottom: 2rem;
        }

        .section-header h2 {
            font-size: 1.8rem;
            color: var(--text-white);
            margin: 0 0 0.5rem 0;
            font-weight: 700;
        }

        .section-header p {
            color: var(--text-muted);
            margin: 0;
            font-size: 1rem;
        }

            overflow: hidden;
        }
